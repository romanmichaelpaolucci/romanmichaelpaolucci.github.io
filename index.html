<!DOCTYPE html>
<html lang="en">

<style>
/* Reset some default styles */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

/* Apply a background animation */
body {
    background-color: #222; /* Background color */
    background-image: linear-gradient(45deg, #0074e4, #00a6e4); /* Gradient background */
    animation: gradientAnimation 15s ease infinite; /* Background animation */
}

@keyframes gradientAnimation {
    0% {
        background-position: 0% 50%;
    }
    100% {
        background-position: 100% 50%;
    }
}

/* Style the header and navigation */
header {
    background-color: #333;
    padding: 20px 0;
}

nav ul {
    list-style: none;
    text-align: center;
}

nav li {
    display: inline;
    margin-right: 20px;
}

nav a {
    text-decoration: none;
    color: #fff;
    font-weight: bold;
}

/* Style the main content */
main {
    max-width: 800px;
    margin: 0 auto;
    padding: 40px;
    background-color: rgba(255, 255, 255, 0.9);
    border-radius: 8px;
    box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.2);
    text-align: center;
    color: #333;
}

h1, h2 {
    color: #0074e4; /* Header text color */
}

/* Style the footer */
footer {
    text-align: center;
    padding: 20px 0;
    background-color: #333;
    color: #fff;
} 
</style>
  
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav>
            <ul>
                <li><a href="#about">About</a></li>
                <li><a href="#portfolio">Portfolio</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </nav>
    </header>
    
    <main>
        <section id="about">
            <h1>About Me</h1>
            <p>Welcome to my minimalist portfolio website.</p>
        </section>
        
        <section id="portfolio">
            <h2>Portfolio</h2>
            <!-- Your portfolio items go here -->
        </section>
        
        <section id="contact">
            <h2>Contact</h2>
            <p>Contact me at example@email.com</p>
        </section>
    </main>
    
    <footer>
        <p>&copy; 2023 Your Name</p>
    </footer>
</body>
</html>
